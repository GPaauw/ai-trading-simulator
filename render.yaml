# render.yaml — bewaar dit bestand in de ROOT van je repository.
# Render detecteert het automatisch bij het aanmaken van een nieuwe Web Service.
services:
  - type: web
    name: ai-trading-simulator-backend
    runtime: python
    pythonVersion: 3.12.3
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: APP_USERNAME
        # Stel deze in via de Render dashboard of secret management
        value: ""
      - key: APP_PASSWORD
        # Stel deze in via de Render dashboard of secret management
        value: ""
      - key: PREFETCH_ON_STARTUP
        # Zet op 'true' om bij startup te prefetchen; default 'false' vermindert memory gebruik
        value: "false"
      - key: PREFETCH_BATCH_SIZE
        # Kleinere batch verlaagt RAM-pieken tijdens yfinance-downloads
        value: "15"
      - key: PREFETCH_YF_THREADS
        # yfinance threading uit op kleine Render-instances om geheugendruk te verlagen
        value: "false"
      - key: ADVICE_MAX_WORKERS
        # Minder parallelle analyse-taken voorkomt thread- en memory-pieken
        value: "8"
      - key: GEMINI_API_KEY
        # Gemini API key uit Google AI Studio voor AI-analyse
        sync: false
      - key: GEMINI_MODEL
        # Snelle en goedkope Gemini-variant voor JSON-analyse
        value: "gemini-2.0-flash"
      - key: GROQ_API_KEY
        # Groq API key voor autonome auto-trader (gratis via console.groq.com)
        sync: false
      - key: GROQ_MODEL
        # Llama 3.3 70B via Groq voor autonome trading-loop
        value: "llama-3.3-70b-versatile"
      - key: AUTO_TRADE
        # Zet op 'true' om de autonome trading-bot te starten bij deployment
        value: "false"
      - key: AUTO_TRADE_INTERVAL
        # Interval in minuten tussen trading-cycli
        value: "10"
