# render.yaml — bewaar dit bestand in de ROOT van je repository.
# Render detecteert het automatisch bij het aanmaken van een nieuwe Web Service.
services:
  - type: web
    name: ai-trading-simulator-backend
    runtime: python
    pythonVersion: 3.12.3
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: APP_USERNAME
        # Stel deze in via de Render dashboard of secret management
        value: ""
      - key: APP_PASSWORD
        # Stel deze in via de Render dashboard of secret management
        value: ""
      - key: PREFETCH_ON_STARTUP
        # Zet op 'true' om bij startup te prefetchen; default 'false' vermindert memory gebruik
        value: "false"
      - key: PREFETCH_BATCH_SIZE
        # Kleinere batch verlaagt RAM-pieken tijdens yfinance-downloads
        value: "15"
      - key: PREFETCH_YF_THREADS
        # yfinance threading uit op kleine Render-instances om geheugendruk te verlagen
        value: "false"
      - key: ADVICE_MAX_WORKERS
        # Minder parallelle analyse-taken voorkomt thread- en memory-pieken
        value: "8"
      - key: GROQ_API_KEY
        # Gratis API key van https://console.groq.com voor AI-analyse
        value: ""
