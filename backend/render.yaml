services:
  - type: web
    name: ai-trading-bot
    runtime: python
    pythonVersion: 3.12.3
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: START_BALANCE
        value: "5000"
      - key: AUTO_TRADE_INTERVAL
        value: "5"
      - key: PREFETCH_BATCH_SIZE
        value: "15"
