name: Deploy Frontend naar GitHub Pages

on:
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Flutter installeren
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Dependencies installeren
        working-directory: frontend
        run: flutter pub get

      - name: Flutter Web bouwen
        working-directory: frontend
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://ai-trading-simulator.onrender.com"
          fi
          flutter build web \
            --release \
            --base-href "/${{ github.event.repository.name }}/" \
            --dart-define=BACKEND_URL="$BACKEND_URL"

      - name: Deployen naar GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/build/web
          publish_branch: gh-pages
          force_orphan: true
          cname: ""
