name: Build and Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Flutter web
        working-directory: frontend
        run: flutter build web --release --base-href "/${GITHUB_REPOSITORY#*/}/"

      - name: Add SPA fallback for GitHub Pages
        run: cp frontend/build/web/index.html frontend/build/web/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build/web
