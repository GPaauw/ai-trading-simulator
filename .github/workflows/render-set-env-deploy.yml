name: Set Render env-vars and deploy

on:
  workflow_dispatch:
    inputs:
      app_username:
        description: 'Optionele gebruikersnaam (valt terug op secret BACKEND_APP_USERNAME)'
        required: false
      app_password:
        description: 'Optioneel wachtwoord (valt terug op secret BACKEND_APP_PASSWORD)'
        required: false

jobs:
  set-env-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs and secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing RENDER_API_KEY or RENDER_SERVICE_ID in repo secrets"; exit 1
          fi

      - name: Set Render env-vars and trigger deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          APP_USERNAME: ${{ github.event.inputs.app_username || secrets.BACKEND_APP_USERNAME }}
          APP_PASSWORD: ${{ github.event.inputs.app_password || secrets.BACKEND_APP_PASSWORD }}
        run: |
          set -e
          if [ -z "$APP_USERNAME" ] || [ -z "$APP_PASSWORD" ]; then
            echo "APP_USERNAME or APP_PASSWORD not provided via inputs or secrets BACKEND_APP_USERNAME/BACKEND_APP_PASSWORD"; exit 1
          fi

          echo "Updating env vars on Render service $RENDER_SERVICE_ID..."
          # The Render API accepts an array payload to create/update env vars.
          curl -sS -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "[{\"key\":\"APP_USERNAME\",\"value\":\"$APP_USERNAME\",\"secure\":false},{\"key\":\"APP_PASSWORD\",\"value\":\"$APP_PASSWORD\",\"secure\":true}]"

          echo
          echo "Triggering a new deploy for service $RENDER_SERVICE_ID..."
          curl -sS -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' 

          echo
          echo "Done. Check Render dashboard for deploy progress and logs."
